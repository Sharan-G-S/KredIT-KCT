<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - KredIT Student Portal</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/student.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>K</text></svg>">
</head>
<body>
  <div class="bg-gradient-mesh"></div>
  <div class="app-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <h1 id="welcomeTitle">Good Morning</h1>
          <p class="page-subtitle"><span id="studentGreeting">Hello!</span> <span id="studentInfo"></span></p>
          <div class="student-meta" id="studentMeta"></div>
        </div>
        <a href="log-entry.html" class="btn btn-primary">+ New Log Entry</a>
      </div>
      <div class="page-body">
        <div class="grid grid-4 gap-4 mb-6 stagger-children" id="statsGrid"></div>
        <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:24px" class="responsive-grid">
          <div class="card">
            <div class="flex items-center justify-between mb-4">
              <h3 style="font-size:1.1rem">Credit Progress</h3>
              <a href="credit-tracker.html" class="btn btn-ghost btn-sm">View Details &rarr;</a>
            </div>
            <div class="progress-ring-container" id="mainProgressRing" style="display:flex;align-items:center;justify-content:center;position:relative"></div>
            <div id="clubProgressList" style="margin-top:20px"></div>
          </div>
          <div class="card">
            <h3 style="font-size:1.1rem;margin-bottom:16px">Recent Activity</h3>
            <div id="activityFeed"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/clubs-data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/credit-engine.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/student-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var user = requireAuth(['student']);
      if (!user) return;
      document.getElementById('sidebarContainer').innerHTML = buildSidebar('student', 'dashboard');
      renderStudentDashboard(user);
    });
  </script>
</body>
</html>
