<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - KredIT Admin Portal</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>K</text></svg>">
</head>
<body>
  <div class="bg-gradient-mesh"></div>
  <div class="app-layout">
    <div id="sidebarContainer"></div>
    <main class="main-content">
      <div class="page-header"><div><h1>Manage Users</h1><p class="page-subtitle">View and manage all registered users</p></div></div>
      <div class="page-body">
        <div class="card mb-6" style="padding:16px 20px">
          <div class="flex items-center gap-4 flex-wrap">
            <div class="search-bar" style="flex:1;min-width:200px"><input type="text" id="userSearch" placeholder="Search users..."></div>
            <select class="form-select" id="userRoleFilter" style="width:auto;min-width:160px">
              <option value="">All Roles</option>
              <option value="student">Students</option>
              <option value="admin">Admins</option>
            </select>
          </div>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Department</th><th>Clubs</th><th>Joined</th></tr></thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/clubs-data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/credit-engine.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/admin-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var user = requireAuth(['admin']);
      if (!user) return;
      document.getElementById('sidebarContainer').innerHTML = buildSidebar('admin', 'manage-users');
      renderManageUsers();
    });
  </script>
</body>
</html>
